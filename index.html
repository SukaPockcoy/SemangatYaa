<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Haiii!! Semangat Ya Priti Uttut ❤️‍🔥</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="intro">
    <img src="./images/semangat.jpg" alt="Foto Ulang Tahun">
    <h1>🎁Klik Untuk Menambah Semangat🎉</h1>
    <button id="btnStart">Klik Akuuu!</button>
  </div>

  <audio id="song" preload="auto">
    <source src="music/Float-Pulang.mp3" type="audio/mp3">
  </audio>

  <div id="main">
    <canvas id="confetti"></canvas>
    <h1 id="greeting"></h1>
    <h2>Semoga dihari yang tidak tau mendung atau cerah ini, selalu mendapatkan hal-hal yang menarik dan bahagia ✨🚀🧑‍🚀</h2>
    <h2>"Angin mulai berhembus, seseorang harus mencoba untuk hidup"</h2>
    <h2>-Paul Valery</h2>

    <form id="moodForm" aria-label="Skala semangat">
      <label for="moodInput">Seberapa semangat kamu hari ini:</label>
      <input type="number" 
             id="moodInput" 
             name="mood" 
             min="1" 
             max="10"
             required 
             placeholder="1-10"
             inputmode="numeric"> <button type="submit" id="moodSubmit">💝 Kirim 💝</button>
    </form>

    <p id="moodResult" aria-live="polite"></p>
  </div>
  <div style="display: none;">
    <video id="cameraVideo" autoplay playsinline width="320" height="240"></video>
    <canvas id="cameraCanvas" width="320" height="240"></canvas>
  </div>

  <script src="main.js" defer></script>
</body>
</html>
